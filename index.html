<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snus Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#09090b;--ink2:#111115;--ink3:#18181e;--ink4:#222229;
  --line:#2e2e38;--line2:#3d3d4a;
  --gold:#bf9b4e;--gold2:#d9b96a;--gold3:rgba(191,155,78,.1);--gold4:rgba(191,155,78,.22);
  --cream:#f0ece3;--cream2:#b8b4aa;--cream3:#6e6b65;
  --red:#c94545;--green:#3d9e6a;
  --r:10px;--sidebar:258px;--hdr:58px;--timer:44px;--cart:380px;
}
html{scroll-behavior:smooth;font-size:15px}
body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--ink2)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* ── TIMER BANNER ── */
#timerBanner{
  position:fixed;top:0;left:0;right:0;z-index:400;
  height:var(--timer);
  background:linear-gradient(90deg,#1a1508,#2a1f08,#1a1508);
  border-bottom:1px solid rgba(191,155,78,.3);
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:.78rem;color:var(--cream2);
}
.timer-label{font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:.68rem;color:var(--gold)}
.timer-blocks{display:flex;align-items:center;gap:6px}
.tblock{
  background:rgba(0,0,0,.4);border:1px solid rgba(191,155,78,.25);
  border-radius:6px;padding:4px 10px;text-align:center;min-width:48px;
}
.tnum{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--gold2);line-height:1}
.tlbl{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cream3);margin-top:1px}
.tsep{color:var(--gold);font-size:1.1rem;opacity:.5;margin-top:-4px}
.timer-msg{font-size:.7rem;color:var(--cream3);margin-left:6px}
.timer-urgent{color:var(--red)!important}

/* ── HEADER ── */
header{
  position:fixed;top:var(--timer);left:0;right:0;z-index:300;
  height:var(--hdr);
  background:rgba(9,9,11,.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.35rem;font-weight:700;letter-spacing:.06em;
  color:var(--cream);white-space:nowrap;
}
.logo span{color:var(--gold);font-style:italic}
.logo-sep{color:var(--line2);margin:0 4px}
.search-box{flex:1;max-width:380px;position:relative}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--cream3);pointer-events:none}
#searchInput{
  width:100%;background:var(--ink3);border:1px solid var(--line);border-radius:8px;
  color:var(--cream);padding:8px 14px 8px 34px;
  font-family:'Syne',sans-serif;font-size:.82rem;outline:none;transition:border .2s;
}
#searchInput:focus{border-color:var(--gold)}
#searchInput::placeholder{color:var(--cream3)}
.hgap{flex:1}
.count-lbl{font-size:.73rem;color:var(--cream3);white-space:nowrap}
.count-lbl strong{color:var(--gold2);font-weight:700}
.cart-btn{
  background:var(--gold);border:none;border-radius:8px;color:#000;
  padding:8px 16px 8px 12px;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:background .15s,transform .1s;white-space:nowrap;
}
.cart-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.cart-n{background:#000;color:var(--gold);border-radius:20px;padding:1px 7px;font-size:.7rem;font-weight:700;min-width:20px;text-align:center}
.cart-n.hide{display:none}

/* ── LAYOUT ── */
.wrap{display:flex;padding-top:calc(var(--timer) + var(--hdr));min-height:100vh}

/* ── SIDEBAR ── */
aside{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--ink2);border-right:1px solid var(--line);
  position:fixed;top:calc(var(--timer)+var(--hdr));left:0;
  height:calc(100vh - var(--timer) - var(--hdr));
  overflow-y:auto;padding:18px 13px 40px;
}
.fg{margin-bottom:22px}
.fgt{
  font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:9px;padding:0 6px;
  display:flex;align-items:center;gap:8px;
}
.fgt::after{content:'';flex:1;height:1px;background:var(--line)}
.fb{
  display:flex;align-items:center;gap:7px;width:100%;background:none;
  border:1px solid transparent;border-radius:7px;color:var(--cream3);
  text-align:left;padding:7px 10px;font-family:'Syne',sans-serif;font-size:.8rem;
  cursor:pointer;transition:all .15s;margin-bottom:1px;
}
.fb:hover{color:var(--cream2);background:var(--ink3)}
.fb.on{color:var(--gold2);background:var(--gold3);border-color:var(--gold4)}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.clr-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;background:none;border:1px solid var(--line);
  border-radius:7px;color:var(--cream3);padding:7px;
  font-family:'Syne',sans-serif;font-size:.74rem;cursor:pointer;
  transition:all .15s;margin-top:8px;
}
.clr-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── MAIN ── */
main{margin-left:var(--sidebar);flex:1;min-width:0;padding:20px 20px 60px;transition:margin-right .3s}
main.co{margin-right:var(--cart)}
.topbar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.pg-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--cream);line-height:1}
.pg-sub{font-family:'Syne',sans-serif;font-size:.78rem;color:var(--cream3);font-style:normal;margin-left:8px}
.sort-row{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.slbl{font-size:.72rem;color:var(--cream3)}
.sbtn{background:var(--ink3);border:1px solid var(--line);border-radius:6px;color:var(--cream3);padding:5px 10px;font-family:'Syne',sans-serif;font-size:.72rem;cursor:pointer;transition:all .15s}
.sbtn.on,.sbtn:hover{color:var(--gold2);border-color:var(--gold4);background:var(--gold3)}
#chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--gold3);border:1px solid var(--gold4);border-radius:20px;padding:3px 9px;font-size:.7rem;color:var(--gold2)}
.cx{background:none;border:none;cursor:pointer;color:var(--gold2);font-size:.8rem;line-height:1;padding:0;opacity:.7}
.cx:hover{opacity:1}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:12px;margin-top:12px}

/* ── CARD ── */
.card{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);border-color:rgba(191,155,78,.4);box-shadow:0 12px 32px rgba(0,0,0,.55)}
.cimg{width:100%;height:140px;background:var(--ink3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0}
.cimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:8px;opacity:0;transition:opacity .3s,transform .3s}
.cimg img.in{opacity:1}
.card:hover .cimg img.in{transform:scale(1.06)}
.ceph{font-size:3rem;user-select:none;transition:opacity .3s}
.shim{background:linear-gradient(90deg,var(--ink3) 0%,var(--ink4) 50%,var(--ink3) 100%);background-size:300%;animation:sh 1.6s infinite}
@keyframes sh{0%{background-position:200%}100%{background-position:-200%}}
.cbody{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column}
.cbrnd{font-size:.62rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.cname{font-family:'Cormorant Garamond',serif;font-size:.98rem;font-weight:600;line-height:1.25;color:var(--cream);margin-bottom:7px;flex:1}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tag{font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:20px;letter-spacing:.02em}
.tf{background:rgba(255,255,255,.04);color:var(--cream3);border:1px solid var(--line)}
.cbot{display:flex;align-items:center;justify-content:space-between}
.cpr{font-family:'Cormorant Garamond',serif;font-size:1.12rem;font-weight:700;color:var(--gold2)}
.cnic{font-size:.63rem;color:var(--cream3);margin-top:2px}
.add-btn{
  background:var(--gold3);border:1px solid var(--gold4);border-radius:7px;
  color:var(--gold2);width:30px;height:30px;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.add-btn:hover{background:var(--gold);color:#000;border-color:var(--gold)}
.bdg{position:absolute;font-size:.58rem;font-weight:800;letter-spacing:.07em;padding:3px 7px;border-radius:4px;line-height:1}
.bsale{top:8px;right:8px;background:var(--red);color:#fff}
.s0{color:#aaa;border:1px solid #aaa}.s1{color:#5ecf94;border:1px solid #5ecf94}
.s2{color:#5ab5e8;border:1px solid #5ab5e8}.s3{color:#e8c43a;border:1px solid #e8c43a}
.s4{color:#e8853a;border:1px solid #e8853a}.s5{color:#de4040;border:1px solid #de4040}
.d0{background:#aaa}.d1{background:#5ecf94}.d2{background:#5ab5e8}
.d3{background:#e8c43a}.d4{background:#e8853a}.d5{background:#de4040}
.nores{grid-column:1/-1;padding:80px 20px;text-align:center;color:var(--cream3)}
.nores .ni{font-size:2.5rem;display:block;margin-bottom:12px}

/* ── MODAL ── */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:400;align-items:center;justify-content:center;padding:20px}
.ovl.open{display:flex}
.modal{background:var(--ink2);border:1px solid var(--line);border-radius:14px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;animation:rise .2s ease;position:relative}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.mimg{width:100%;height:210px;background:var(--ink3);border-radius:14px 14px 0 0;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.mimg img{max-width:100%;max-height:100%;object-fit:contain;padding:16px;position:absolute;opacity:0;transition:opacity .3s}
.mimg img.in{opacity:1}
.meph{font-size:5rem}
.mcls{position:absolute;top:12px;right:12px;z-index:10;background:var(--ink3);border:1px solid var(--line);border-radius:7px;width:30px;height:30px;color:var(--cream3);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mcls:hover{color:var(--cream);border-color:var(--line2)}
.mbody{padding:22px 24px 24px}
.mbrnd{font-size:.62rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.mname{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;line-height:1.2;margin-bottom:14px}
.mtags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.mspec{background:var(--ink3);border-radius:8px;overflow:hidden;margin-bottom:18px}
.sr{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--line);font-size:.82rem}
.sr:last-child{border:none}
.sl2{color:var(--cream3)}.sv{font-weight:600}
.mftr{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mpr{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold2)}
.mcost{font-size:.78rem;color:var(--cream3)}
.madd{margin-left:auto;background:var(--gold);border:none;border-radius:9px;color:#000;padding:11px 22px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.madd:hover{background:var(--gold2);transform:translateY(-1px)}

/* ── CART DRAWER ── */
.cart-drw{
  position:fixed;top:calc(var(--timer)+var(--hdr));right:0;
  width:var(--cart);height:calc(100vh - var(--timer) - var(--hdr));
  background:var(--ink2);border-left:1px solid var(--line);
  z-index:250;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.cart-drw.open{transform:none}
.cart-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cart-ttl{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;flex:1}
.ccls{background:none;border:1px solid var(--line);border-radius:7px;color:var(--cream3);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:all .15s}
.ccls:hover{color:var(--cream);border-color:var(--line2)}
.cart-items{flex:1;overflow-y:auto;padding:10px 14px}
.cempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--cream3);text-align:center;gap:8px}
.cempty big{font-size:2.5rem}
.cempty p{font-size:.8rem}
.ci{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.ci:last-child{border:none}
.cithumb{width:46px;height:46px;border-radius:7px;background:var(--ink3);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:1.3rem}
.cithumb img{width:100%;height:100%;object-fit:contain;padding:3px}
.ciinfo{flex:1;min-width:0}
.cibrnd{font-size:.57rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.ciname{font-size:.78rem;font-weight:600;color:var(--cream);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ciprice{font-size:.76rem;color:var(--gold2);font-weight:700;margin-top:2px}
.ciqty{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qbtn{background:var(--ink3);border:1px solid var(--line);border-radius:5px;width:24px;height:24px;color:var(--cream3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .15s}
.qbtn:hover{background:var(--ink4);color:var(--cream);border-color:var(--line2)}
.qnum{font-size:.78rem;font-weight:700;color:var(--cream);min-width:18px;text-align:center}
.cirm{background:none;border:none;color:var(--cream3);cursor:pointer;font-size:.82rem;padding:2px;transition:color .15s;flex-shrink:0}
.cirm:hover{color:var(--red)}
.cart-ftr{padding:12px 14px;border-top:1px solid var(--line);flex-shrink:0}
.ct-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ct-lbl{font-size:.8rem;color:var(--cream3)}
.ct-amt{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold2)}
.cform{margin-bottom:10px}
.cform-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.cform-row.full{grid-template-columns:1fr}
.cform input,.cform textarea{width:100%;background:var(--ink3);border:1px solid var(--line);border-radius:7px;color:var(--cream);padding:7px 10px;font-family:'Syne',sans-serif;font-size:.74rem;outline:none;transition:border .2s}
.cform input:focus,.cform textarea:focus{border-color:var(--gold)}
.cform input::placeholder,.cform textarea::placeholder{color:var(--cream3)}
.cform textarea{resize:none;height:52px}
.flbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cream3);margin-bottom:5px;display:block}
.cacts{display:flex;flex-direction:column;gap:7px}
.exp-btn{background:var(--gold);border:none;border-radius:8px;color:#000;padding:11px;width:100%;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.exp-btn:hover{background:var(--gold2)}
.cpy-btn{background:var(--ink3);border:1px solid var(--line);border-radius:8px;color:var(--cream3);padding:9px;width:100%;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.cpy-btn:hover{border-color:var(--line2);color:var(--cream)}
.clrcrt{background:none;border:none;color:var(--cream3);font-family:'Syne',sans-serif;font-size:.7rem;cursor:pointer;text-align:center;width:100%;padding:3px;transition:color .15s}
.clrcrt:hover{color:var(--red)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink3);border:1px solid var(--line2);border-radius:8px;padding:9px 16px;font-size:.76rem;color:var(--cream);z-index:1000;opacity:0;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:7px;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ti-ok{color:var(--green)}.ti-inf{color:var(--gold)}
</style>
</head>
<body>

<!-- TIMER BANNER -->
<div id="timerBanner">
  <span class="timer-label">⏳ Next Order In</span>
  <div class="timer-blocks">
    <div class="tblock"><div class="tnum" id="tD">--</div><div class="tlbl">Days</div></div>
    <span class="tsep">:</span>
    <div class="tblock"><div class="tnum" id="tH">--</div><div class="tlbl">Hrs</div></div>
    <span class="tsep">:</span>
    <div class="tblock"><div class="tnum" id="tM">--</div><div class="tlbl">Min</div></div>
    <span class="tsep">:</span>
    <div class="tblock"><div class="tnum" id="tS">--</div><div class="tlbl">Sec</div></div>
  </div>
  <span class="timer-msg" id="timerMsg">— order deadline</span>
</div>

<header>
  <div class="logo">Snus <span>Catalogue</span></div>
  <div class="logo-sep">|</div>
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Search brand, name or flavour…" oninput="rf()">
  </div>
  <div class="hgap"></div>
  <div class="count-lbl">Showing <strong id="cnt">0</strong> products</div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 My Order <span class="cart-n hide" id="cartN">0</span>
  </button>
</header>

<div class="wrap">
  <aside>
    <div class="fg">
      <div class="fgt">Browse</div>
      <button class="fb on" data-k="cat" data-v="all" onclick="setF('cat','all',this)">All Products</button>
      <button class="fb" data-k="cat" data-v="sale" onclick="setF('cat','sale',this)">🔥 On Sale</button>
    </div>
    <div class="fg">
      <div class="fgt">Strength</div>
      <button class="fb on" data-k="str" data-v="all" onclick="setF('str','all',this)">All Strengths</button>
      <button class="fb" data-k="str" data-v="Leicht" onclick="setF('str','Leicht',this)"><span class="fdot d1"></span>Light · 1–5 mg</button>
      <button class="fb" data-k="str" data-v="Mittelstark" onclick="setF('str','Mittelstark',this)"><span class="fdot d2"></span>Medium · 6–9 mg</button>
      <button class="fb" data-k="str" data-v="Stärker" onclick="setF('str','Stärker',this)"><span class="fdot d3"></span>Strong · 10–14 mg</button>
      <button class="fb" data-k="str" data-v="Extra Stark" onclick="setF('str','Extra Stark',this)"><span class="fdot d4"></span>Extra · 15–20 mg</button>
      <button class="fb" data-k="str" data-v="Ultra Stark" onclick="setF('str','Ultra Stark',this)"><span class="fdot d5"></span>Ultra · 21–65 mg</button>
    </div>
    <div class="fg">
      <div class="fgt">Flavour</div>
      <button class="fb on" data-k="flv" data-v="all" onclick="setF('flv','all',this)">All Flavours</button>
      <button class="fb" data-k="flv" data-v="mint" onclick="setF('flv','mint',this)">🌿 Mint / Menthol</button>

// ══ EMOJIS by flavour ══
const EMO={mint:['❄️','🌿','🌬️','🧊'],berry:['🫐','🍇','🍒','🍓'],fruit:['🍑','🥭','🍋','🍊','🍌','🥝','🍉','🌺'],other:['🌶️','🥤','⚫','🍹','💎']};
function emo(p){const a=EMO[p.flv]||EMO.other;return a[p.id%a.length];}
const SL=['Nic-Free','Light','Medium','Strong','Extra Strong','Ultra Strong'];
const FL={mint:'🌿 Mint',berry:'🫐 Berry',fruit:'🍑 Fruit',other:'🌶️ Other'};

// ══ IMAGE CACHE ══
const IC={};
async function getImg(h){
  if(h in IC)return IC[h];
  IC[h]=null;
  try{
    const r=await fetch(`https://snuzone.com/products/${h}.js`);
    if(!r.ok)throw 0;
    const d=await r.json();
    const raw=d.featured_image||(d.images&&d.images[0]&&d.images[0].src)||null;
    IC[h]=raw?('https:'+raw).replace(/\?.*/,'')+('?width=400'):null;
  }catch(e){IC[h]=null;}
  return IC[h];
}

// ══ STATE ══
const F={cat:'all',str:'all',flv:'all',brd:'all'};
let SORT='def',cartOpen=false,CART={};

function matches(p){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  if(q&&!(p.b.toLowerCase().includes(q)||p.n.toLowerCase().includes(q)||p.flv.includes(q)||p.str.toLowerCase().includes(q)))return false;
  if(F.cat==='sale'&&p.sell<=p.cost+1)return false;
  if(F.str!=='all'&&p.str!==F.str)return false;
  if(F.flv!=='all'&&p.flv!==F.flv)return false;
  if(F.brd!=='all'&&p.b!==F.brd)return false;
  return true;
}
function getSorted(){
  const a=[...P];
  if(SORT==='asc')a.sort((x,y)=>x.sell-y.sell);
  else if(SORT==='desc')a.sort((x,y)=>y.sell-x.sell);
  else if(SORT==='az')a.sort((x,y)=>(x.b+x.n).localeCompare(y.b+y.n));
  return a;
}

// ══ RENDER ══
function rf(){
  const g=document.getElementById('grid');
  const vis=getSorted().filter(matches);
  document.getElementById('cnt').textContent=vis.length;
  renderChips();
  if(!vis.length){g.innerHTML=`<div class="nores"><span class="ni">🔍</span><p>No products found.</p></div>`;return;}
  g.innerHTML=vis.map(buildCard).join('');
  vis.forEach(loadCImg);
}

function buildCard(p){
  const sc='s'+p.sl,em=emo(p);
  const onSale=p.sell>p.cost+1;
  return `<div class="card" onclick="openMod(${p.id})">
    ${onSale?`<div class="bdg bsale">SALE</div>`:''}
    <div class="cimg shim" id="cw${p.id}"><div class="ceph" id="ce${p.id}">${em}</div></div>
    <div class="cbody">
      <div class="cbrnd">${p.b}</div>
      <div class="cname">${p.n}</div>
      <div class="ctags"><span class="tag ${sc}">${SL[p.sl]}</span><span class="tag tf">${FL[p.flv]}</span></div>
      <div class="cbot">
        <div><div class="cpr">€${p.sell}</div><div class="cnic">${p.str}</div></div>
        <button class="add-btn" onclick="event.stopPropagation();addCart(${p.id})" title="Add to order">＋</button>
      </div>
    </div>
  </div>`;
}

async function loadCImg(p){
  const w=document.getElementById('cw'+p.id),e=document.getElementById('ce'+p.id);
  if(!w)return;
  const url=await getImg(p.h);
  if(!document.getElementById('cw'+p.id))return;
  w.classList.remove('shim');
  if(url){
    const img=new Image();img.alt=p.n;img.loading='lazy';
    img.onload=()=>{img.classList.add('in');if(e&&e.parentNode===w)e.style.opacity='0';};
    img.onerror=()=>{};
    img.src=url;w.appendChild(img);
  }
}

// ══ MODAL ══
let modP=null;
function openMod(id){
  const p=P.find(x=>x.id===id);if(!p)return;modP=p;
  const mi=document.getElementById('mImg');
  mi.innerHTML=`<div class="meph" id="mph">${emo(p)}</div>`;
  getImg(p.h).then(url=>{
    if(!url)return;
    const img=new Image();
    img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;padding:14px;position:absolute;opacity:0;transition:opacity .3s';
    img.onload=()=>{img.style.opacity='1';const ph=document.getElementById('mph');if(ph)ph.style.opacity='0';};
    img.src=url;mi.appendChild(img);
  });
  document.getElementById('mBrand').textContent=p.b;
  document.getElementById('mName').textContent=p.n;
  const sc='s'+p.sl;
  document.getElementById('mTags').innerHTML=`<span class="tag ${sc}" style="font-size:.72rem;padding:3px 9px">${SL[p.sl]}</span><span class="tag tf" style="font-size:.72rem;padding:3px 9px">${FL[p.flv]}</span>`;
  document.getElementById('mSpec').innerHTML=`
    <div class="sr"><span class="sl2">Brand</span><span class="sv">${p.b}</span></div>
    <div class="sr"><span class="sl2">Strength</span><span class="sv">${p.str}</span></div>
    <div class="sr"><span class="sl2">Flavour</span><span class="sv">${FL[p.flv]}</span></div>`;
  document.getElementById('mPrice').textContent='€'+p.sell;
  document.getElementById('mCost').textContent='snuzone.com price: €'+p.cost;
  document.getElementById('ovl').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMod(){document.getElementById('ovl').classList.remove('open');document.body.style.overflow='';modP=null;}
function ovlClick(e){if(e.target===document.getElementById('ovl'))closeMod();}
document.getElementById('mAddBtn').onclick=()=>{if(modP){addCart(modP.id);closeMod();}};

// ══ CART ══
function addCart(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  CART[id]?CART[id].qty++:CART[id]={p,qty:1};
  renderCart();toast(`${p.b} ${p.n} added`,'ok');
  if(!cartOpen)toggleCart();
}
function rmCart(id){delete CART[id];renderCart();}
function chgQty(id,d){if(!CART[id])return;CART[id].qty+=d;if(CART[id].qty<=0)delete CART[id];renderCart();}
function cartList(){return Object.values(CART);}
function cartTot(){return cartList().reduce((s,c)=>s+c.p.sell*c.qty,0);}
function cartCnt(){return cartList().reduce((s,c)=>s+c.qty,0);}
function clearCart(){CART={};renderCart();toast('Order cleared','inf');}

function renderCart(){
  const items=cartList(),cnt=cartCnt();
  const n=document.getElementById('cartN');
  n.textContent=cnt;n.classList.toggle('hide',cnt===0);
  const ftr=document.getElementById('cartFtr'),emp=document.getElementById('cartEmpty'),ci=document.getElementById('cartItems');
  if(!items.length){emp.style.display='flex';ftr.style.display='none';ci.querySelectorAll('.ci').forEach(e=>e.remove());return;}
  emp.style.display='none';ftr.style.display='block';
  document.getElementById('cartTotal').textContent='€'+cartTot();
  ci.querySelectorAll('.ci').forEach(e=>e.remove());
  items.forEach(it=>{
    const d=document.createElement('div');d.className='ci';d.id='ci-'+it.p.id;
    d.innerHTML=`<div class="cithumb" id="ct${it.p.id}">${emo(it.p)}</div>
      <div class="ciinfo">
        <div class="cibrnd">${it.p.b}</div>
        <div class="ciname">${it.p.n}</div>
        <div class="ciprice">€${it.p.sell} × ${it.qty} = €${it.p.sell*it.qty}</div>
      </div>
      <div class="ciqty">
        <button class="qbtn" onclick="chgQty(${it.p.id},-1)">−</button>
        <span class="qnum">${it.qty}</span>
        <button class="qbtn" onclick="chgQty(${it.p.id},1)">＋</button>
      </div>
      <button class="cirm" onclick="rmCart(${it.p.id})">✕</button>`;
    ci.insertBefore(d,ftr);
    getImg(it.p.h).then(url=>{
      const tw=document.getElementById('ct'+it.p.id);
      if(!tw||!url)return;
      const img=new Image();img.style.cssText='width:100%;height:100%;object-fit:contain;padding:3px';
      img.src=url;tw.innerHTML='';tw.appendChild(img);
    });
  });
}

function toggleCart(){cartOpen=!cartOpen;document.getElementById('cartDrw').classList.toggle('open',cartOpen);document.getElementById('mainArea').classList.toggle('co',cartOpen);}

// ══ EXPORT ══
function buildTxt(){
  const items=cartList();
  const name=document.getElementById('cName').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const note=document.getElementById('cNote').value.trim();
  const now=new Date().toLocaleString('de-DE');
  let t='';
  t+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  t+='           SNUS ORDER\n';
  t+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  t+=`Date:    ${now}\n`;
  if(name)t+=`Name:    ${name}\n`;
  if(phone)t+=`Phone:   ${phone}\n`;
  t+='--------------------------------------\n';
  items.forEach(ci=>{
    t+=`  ${ci.p.b} — ${ci.p.n}\n`;
    t+=`    ${ci.p.str}   Qty: ${ci.qty} × €${ci.p.sell} = €${ci.p.sell*ci.qty}\n\n`;
  });
  t+='--------------------------------------\n';
  t+=`TOTAL:   €${cartTot()}\n`;
  t+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  if(note)t+=`Notes: ${note}\n`;
  return t;
}
function exportOrder(){
  if(!cartList().length)return;
  const txt=buildTxt();
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const nm=document.getElementById('cName').value.trim();
  a.download=`snus-order${nm?'-'+nm.replace(/\s+/g,'_'):''}-${new Date().toISOString().slice(0,10)}.txt`;
  a.href=url;a.click();URL.revokeObjectURL(url);
  toast('Order downloaded!','ok');
}
function copyOrder(){
  if(!cartList().length)return;
  navigator.clipboard.writeText(buildTxt()).then(()=>toast('Copied to clipboard!','ok')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=buildTxt();ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('Copied!','ok');
  });
}

// ══ FILTERS ══
function setF(k,v,btn){
  F[k]=v;
  document.querySelectorAll(`[data-k="${k}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');rf();
}
function setSort(m,btn){SORT=m;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');rf();}
function clearAll(){
  Object.keys(F).forEach(k=>F[k]='all');
  document.getElementById('searchInput').value='';
  document.querySelectorAll('[data-v="all"]').forEach(b=>b.classList.add('on'));
  document.querySelectorAll('[data-v]:not([data-v="all"])').forEach(b=>b.classList.remove('on'));
  rf();
}
const FLBLM={cat:{sale:'On Sale'},str:{Leicht:'Light',Mittelstark:'Medium','Stärker':'Strong','Extra Stark':'Extra Strong','Ultra Stark':'Ultra Strong'},flv:{mint:'Mint',berry:'Berry',fruit:'Fruit',other:'Other'},brd:{}};
function renderChips(){
  const bar=document.getElementById('chips');
  let h='';
  for(const[k,v]of Object.entries(F)){
    if(v==='all')continue;
    const l=(FLBLM[k]&&FLBLM[k][v])||v;
    h+=`<div class="chip">${l}<button class="cx" onclick="setF('${k}','all',document.querySelector('[data-k=\\'${k}\\'][data-v=\\'all\\']'))">✕</button></div>`;
  }
  const q=document.getElementById('searchInput').value;
  if(q)h+=`<div class="chip">🔍 "${q}"<button class="cx" onclick="document.getElementById('searchInput').value='';rf()">✕</button></div>`;
  bar.innerHTML=h;bar.style.marginBottom=h?'12px':'0';
}

// ══ TOAST ══
let tT=null;
function toast(msg,type){
  const t=document.getElementById('toast'),ti=document.getElementById('ti'),tm=document.getElementById('tm');
  ti.className=type==='ok'?'ti-ok':'ti-inf';ti.textContent=type==='ok'?'✓':'ℹ';tm.textContent=msg;
  t.classList.add('show');if(tT)clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ══ 14-DAY ORDER TIMER ══
// Starting point: set first order date here (YYYY, M-1, D, H, MIN)
// Every 14 days from this anchor a new order cycle starts.
const ANCHOR = new Date(2026, 2, 22, 20, 0, 0); // Mar 22 2026, 8pm — change this to your actual next order date

function getNextOrderDate(){
  const now=Date.now(),a=ANCHOR.getTime(),cycle=14*24*60*60*1000;
  let next=a;
  while(next<=now)next+=cycle;
  return new Date(next);
}
function updateTimer(){
  const next=getNextOrderDate();
  const diff=next-Date.now();
  if(diff<=0){updateTimer();return;}
  const days=Math.floor(diff/(86400000));
  const hrs=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  const secs=Math.floor((diff%60000)/1000);
  document.getElementById('tD').textContent=String(days).padStart(2,'0');
  document.getElementById('tH').textContent=String(hrs).padStart(2,'0');
  document.getElementById('tM').textContent=String(mins).padStart(2,'0');
  document.getElementById('tS').textContent=String(secs).padStart(2,'0');
  const msg=document.getElementById('timerMsg');
  if(days===0&&hrs<4){msg.className='timer-msg timer-urgent';msg.textContent='⚠ Last chance to order!';}
  else if(days===0){msg.className='timer-msg timer-urgent';msg.textContent=`— order deadline TODAY`;}
  else{msg.className='timer-msg';msg.textContent=`— ${next.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}`;}
}
setInterval(updateTimer,1000);updateTimer();

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMod();if(cartOpen)toggleCart();}});
rf();
